<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUC ITS Assistant</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260410c">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Top bar -->
    <header>
        <div class="header-left">
            <div class="logo">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
            </div>
            <div class="brand">
                <span class="brand-name">ITS Assistant</span>
                <span class="brand-sub">Loyola University Chicago</span>
            </div>
        </div>
        <div class="header-right">
            <div class="header-pill engine-pill">
                <select id="engineSelect" title="Voice pipeline">
                    <option value="cascaded" selected>Cascaded (STT→LLM→TTS)</option>
                    <option value="personaplex">PersonaPlex (local, full-duplex)</option>
                </select>
            </div>
            <div class="header-pill model-pill">
                <select id="modelSelect" title="Switch LLM model">
                    <optgroup label="Remote (HuggingFace)">
                        <option value="qwen2-0.5b">Qwen 0.5B</option>
                        <option value="qwen2-1.5b">Qwen 1.5B</option>
                        <option value="qwen2-7b">Qwen 7B</option>
                        <option value="mistral-7b">Mistral 7B</option>
                        <option value="zephyr-7b" selected>Zephyr 7B</option>
                        <option value="falcon-7b">Falcon 7B</option>
                    </optgroup>
                    <optgroup label="Local (Ollama)">
                        <option value="ollama">Ollama llama3.1</option>
                    </optgroup>
                </select>
            </div>
            <div class="header-pill voice-pill">
                <label class="switch">
                    <input type="checkbox" id="audioToggle" checked>
                    <span class="slider"></span>
                </label>
                <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" opacity="0.7">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 8.14v7.72A4.49 4.49 0 0016.5 12zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                </svg>
            </div>
            <div class="header-pill status-pill">
                <span id="connection-dot" class="status-dot"></span>
                <span id="connection-status">Connecting</span>
            </div>
            <button id="clearBtn" class="header-pill clear-pill" title="Clear chat">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                </svg>
            </button>
        </div>
    </header>

    <main>
        <div id="chat-container">
            <!-- Welcome state (visible when no messages) -->
            <div id="welcome" class="welcome">
                <div class="welcome-icon">
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h2>How can I help you today?</h2>
                <p>Ask about LUC systems, accounts, Wi-Fi, email, or any tech issue.</p>
                <div class="welcome-chips">
                    <button class="chip" data-q="How do I reset my UVID password?">Reset my password</button>
                    <button class="chip" data-q="How do I connect to campus Wi-Fi?">Connect to Wi-Fi</button>
                    <button class="chip" data-q="How do I set up my Loyola email on my phone?">Setup email</button>
                    <button class="chip" data-q="How do I access LOCUS?">Access LOCUS</button>
                </div>
            </div>

            <!-- Messages -->
            <div id="messages"></div>

            <!-- Recording overlay -->
            <div id="recording-overlay" class="recording-overlay">
                <div class="recording-visual">
                    <div class="wave-ring ring-1"></div>
                    <div class="wave-ring ring-2"></div>
                    <div class="wave-ring ring-3"></div>
                    <div class="recording-core">
                        <svg viewBox="0 0 24 24" width="32" height="32" fill="white">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                            <path d="M17 11c0 3.01-2.44 5.5-5.5 5.5S6 14.01 6 11H4c0 3.53 2.61 6.43 6 6.92V21h4v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                    </div>
                </div>
                <div id="recording-text" class="recording-text">Listening...</div>
                <button id="recording-stop" class="recording-stop-btn">Tap to stop</button>
            </div>

            <!-- Input bar -->
            <div id="input-area">
                <div id="partial-transcript"></div>
                <div class="input-row">
                    <button id="micBtn" class="btn-mic" title="Hold or click to talk">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                            <path d="M17 11c0 3.01-2.44 5.5-5.5 5.5S6 14.01 6 11H4c0 3.53 2.61 6.43 6 6.92V21h4v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                    </button>
                    <input type="text" id="textInput" placeholder="Type your question..." autocomplete="off">
                    <button id="sendBtn" class="btn-send" title="Send (Enter)">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                            <path d="M3.4 20.4l17.45-7.48a1 1 0 000-1.84L3.4 3.6a.993.993 0 00-1.39.91L2 9.12c0 .5.37.93.87.99L17 12 2.87 13.88c-.5.07-.87.5-.87 1l.01 4.61c0 .71.73 1.2 1.39.91z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Bump the ?v= query each time app.js / styles.css change so the
         browser cannot serve a stale build. The browser keys on the URL,
         so changing the query forces a fresh fetch. -->
    <script src="/static/app.js?v=20260410c"></script>
</body>
</html>
